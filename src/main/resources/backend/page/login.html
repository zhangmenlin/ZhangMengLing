<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尚食斋 - 登录</title>
    <!-- 引入外部CSS -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
<!-- 整体居中容器 -->
<div class="main-container">
    <!-- 左侧区域：LOGO + 图片 -->
    <div class="left-section">
        <!-- LOGO角标 - 在图片左上方外面 -->
        <div class="brand-corner">
            <div class="brand-logo">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="55" r="38" fill="#fff"/>
                    <circle cx="50" cy="55" r="30" fill="#FFD700"/>
                    <path d="M68 22 Q78 32 68 42 L62 48 L58 44 L64 38 Q70 30 68 22" fill="#fff"/>
                </svg>
            </div>
            <span class="brand-text">尚食斋</span>
        </div>

        <!-- 美食图片 -->
        <div class="food-image-wrapper">
            <img src="/images/image1.jpg" alt="美食展示">
        </div>
    </div>

    <!-- 右侧登录表单 -->
    <div class="login-right">
        <div class="login-box">
            <div class="login-header">
                <h2>欢迎登录</h2>
                <p>一站式门店菜品、订单、会员、员工管理系统</p>
            </div>

            <div class="input-item">
                <label for="username">管理员账号</label>
                <input type="text" id="username" placeholder="请输入管理员账号" value="admin">
            </div>

            <div class="input-item">
                <label for="password">登录密码</label>
                <input type="password" id="password" placeholder="请输入登录密码" value="123456">
            </div>

            <button class="login-btn" onclick="doLogin()">登 录</button>
        </div>
    </div>
</div>

<script>
    // 登录请求逻辑，对接后端 POST /employee/login JSON传参
    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username) {
            alert("请输入账号");
            return;
        }
        if (!password) {
            alert("请输入密码");
            return;
        }
        // 向后端发送POST JSON请求
        const res = await fetch("/employee/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        });
        const data = await res.json();
        // 后端约定 code=1 登录成功
        if (data.code === 1) {
            // 存储用户信息，跳转到后台首页index.html
            localStorage.setItem("userInfo", JSON.stringify(data.data));
            window.location.href = "/index.html";
        } else {
            alert(data.msg || "账号密码错误");
        }
    }

    // 回车键登录
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            doLogin();
        }
    });
</script>
</body>
</html>
